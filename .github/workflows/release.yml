name: release

on:
  push:
    tags:
      - "v*"
  repository_dispatch:
    types:
      - release-rerun
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish, ex: v0.1.0"
        required: true
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref_name }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve_tag:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - id: resolve
        shell: bash
        run: |
          set -euo pipefail
          case "${GITHUB_EVENT_NAME}" in
            repository_dispatch)
              release_tag="$(jq -r '.client_payload.release_tag // empty' "$GITHUB_EVENT_PATH")"
              ;;
            workflow_dispatch)
              release_tag="$(jq -r '.inputs.release_tag // empty' "$GITHUB_EVENT_PATH")"
              ;;
            *)
              release_tag="${GITHUB_REF_NAME}"
              ;;
          esac
          [[ "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

  validate:
    needs: resolve_tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve_tag.outputs.release_tag }}
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - id: meta
        env:
          RELEASE_TAG: ${{ needs.resolve_tag.outputs.release_tag }}
        run: |
          set -euo pipefail
          [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version="$(node -p "require('./packages/npm/package.json').version")"
          if [ "v${version}" != "${RELEASE_TAG}" ]; then
            echo "tag/version mismatch"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  create_release:
    needs: [resolve_tag, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve_tag.outputs.release_tag }}
      - env:
          RELEASE_TAG: ${{ needs.resolve_tag.outputs.release_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --generate-notes

  build_upload:
    needs: [resolve_tag, create_release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            ext: ""
            target: ""
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            ext: ""
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            platform: win32
            arch: x64
            ext: ".exe"
            target: ""
          - os: windows-latest
            platform: win32
            arch: arm64
            ext: ".exe"
            target: aarch64-pc-windows-msvc
          - os: macos-14
            platform: darwin
            arch: arm64
            ext: ""
            target: ""
          - os: macos-14
            platform: darwin
            arch: x64
            ext: ""
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve_tag.outputs.release_tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          if [ -n "${{ matrix.target }}" ]; then
            rustup target add "${{ matrix.target }}"
            cargo build --release -p gunmetal --target "${{ matrix.target }}"
          else
            cargo build --release -p gunmetal
          fi
      - shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          bin_dir='target'
          if [ -n "${{ matrix.target }}" ]; then bin_dir="target/${{ matrix.target }}"; fi
          cp "${bin_dir}/release/gunmetal${{ matrix.ext }}" "dist/gunmetal-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }}"
      - shell: bash
        run: |
          cd dist
          checksum_file="checksums-${{ matrix.platform }}-${{ matrix.arch }}.txt"
          tmp_file="${checksum_file}.tmp"
          if command -v shasum >/dev/null 2>&1; then
            for f in ./gunmetal-*; do
              [ -f "$f" ] || continue
              shasum -a 256 -- "$f"
            done | sed 's# \./# #' > "$tmp_file"
          else
            for f in ./gunmetal-*; do
              [ -f "$f" ] || continue
              sha256sum -- "$f"
            done | sed 's# \./# #' > "$tmp_file"
          fi
          mv "$tmp_file" "$checksum_file"
      - env:
          RELEASE_TAG: ${{ needs.resolve_tag.outputs.release_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for f in dist/*; do
            gh release upload --clobber "${RELEASE_TAG}" "$f"
          done

  publish_npm:
    needs: [resolve_tag, validate, build_upload]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve_tag.outputs.release_tag }}
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: |
          set -euo pipefail
          local_v="$(node -p "require('./packages/npm/package.json').version")"
          remote_v="$(npm view @dhruv2mars/gunmetal version 2>/dev/null || true)"
          if [ -n "${remote_v:-}" ] && [ "${remote_v}" = "${local_v}" ]; then
            echo "skip: already on npm (${remote_v})"
            exit 0
          fi
          rc="${RUNNER_TEMP:-/tmp}/npmrc"
          echo "registry=https://registry.npmjs.org/" > "$rc"
          export NPM_CONFIG_USERCONFIG="$rc"
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> "$rc"
            export NODE_AUTH_TOKEN="${NPM_TOKEN}"
            cd packages/npm && npm publish --access public
          else
            echo "publish via npm trusted publisher"
            unset NODE_AUTH_TOKEN || true
            if cd packages/npm && npm publish --provenance --access public; then
              exit 0
            fi
            echo "trusted publisher not configured and NPM_TOKEN missing"
            exit 1
          fi
        shell: bash
